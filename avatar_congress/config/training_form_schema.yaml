# Congreso de avatares — Ficha de entrenamiento del avatar
#
# Diseño cuali + cuanti EMPAREJADO: cada tema tiene una pregunta CERRADA
# (cuanti) y una ABIERTA corta (cuali) sobre lo mismo. Esto permite construir
# tres avatares por estudiante y compararlos:
#   - cerrado : solo respuestas cerradas (cuanti)
#   - abierto : solo respuestas abiertas (cuali)
#   - ambos   : todo
# Replica en miniatura a Park et al. (2024): las entrevistas cualitativas
# predicen mejor a la persona que las encuestas estructuradas.
#
# Anti-flojera (para que lo cuali no quede vacío):
#   - las abiertas son CORTAS y específicas ("1-2 frases", "¿por qué?"),
#   - van DESPUÉS de su cerrada (el alumno ya está cebado en el tema),
#   - las abiertas clave son obligatorias; lo cuanti se mantuvo acotado.
#
# Cada ítem de pregunta lleva `modality`:
#   context -> va en LOS TRES avatares (identidad/encuadre/guardarraíles)
#   closed  -> alimenta el avatar "cerrado" (y "ambos")
#   open    -> alimenta el avatar "abierto" (y "ambos")
#
# Tipos (Forms API): short_text, paragraph, choice, checkbox, scale, section.

form_title: "Congreso de avatares — Entrenamiento de avatar"
form_description: >
  Esta ficha entrena un avatar político seudónimo que te representará en una
  encuesta. Hay preguntas cerradas y abiertas: las abiertas son cortas pero
  IMPORTAN — mientras mejor te describas, mejor te representará tu avatar.
  No se pide nombre, correo ni RUT. Usa exactamente la llave anónima que
  recibiste: la necesitarás para reconocer tu avatar y ver tus resultados.

items:
  - type: section
    title: "1 · Tu llave"
    description: "Identifícate solo con tu llave anónima."

  - type: short_text
    field: key
    modality: context
    required: true
    title: "Llave anónima asignada"
    description: "Escribe exactamente la llave que recibiste (ej: CONDOR-47). Guárdala: la necesitarás para reconocer tu avatar y ver tus resultados."

  - type: section
    title: "2 · Sobre ti (breve)"

  - type: choice
    field: age
    modality: context
    required: true
    title: "Edad aproximada"
    options: ["18–22", "23–29", "30–39", "40+", "Prefiero no decir"]

  - type: choice
    field: field_of_study
    modality: context
    required: true
    title: "Área de formación o interés principal"
    options:
      - "Políticas públicas / gobierno"
      - "Economía / negocios"
      - "Ingeniería / computación / datos"
      - "Ciencias sociales / humanidades"
      - "Derecho"
      - "Otra"
      - "Prefiero no decir"

  # NOTA: se quitó "Relación general con la IA (escéptica–optimista)" porque
  # solapaba directamente con la pregunta de ansiedad de la encuesta (Q17) —
  # habría sido hacer trampa. El avatar infiere la actitud desde tech_open,
  # avatar_free_text y las prioridades.

  - type: section
    title: "3 · Economía y Estado"

  - type: choice
    field: economy
    modality: closed
    required: true
    title: "En economía, tiendo a priorizar:"
    options:
      - "Redistribución y protección social"
      - "Equilibrio entre mercado y Estado"
      - "Libertad económica y emprendimiento"
      - "Depende del caso"
      - "No sé / prefiero no responder"

  - type: choice
    field: state_role
    modality: closed
    required: true
    title: "Frente al rol del Estado, prefiero:"
    options:
      - "Estado mínimo"
      - "Estado regulador"
      - "Estado proveedor activo"
      - "Estado emprendedor / estratégico"
      - "Depende del área"

  - type: paragraph
    field: econ_open
    modality: open
    required: true
    title: "En tus palabras: ¿qué rol debería tener el Estado en la economía y por qué?"
    description: "1-2 frases."

  - type: section
    title: "4 · Sociedad y cultura"

  - type: choice
    field: social_culture
    modality: closed
    required: true
    title: "En temas sociales/culturales, tiendo a ser:"
    options:
      - "Más progresista"
      - "Más conservador/a"
      - "Libertario/a"
      - "Mixto / depende del tema"
      - "Prefiero no responder"

  - type: paragraph
    field: social_open
    modality: open
    required: true
    title: "¿Hay algún tema social o cultural que te importe especialmente? ¿Por qué?"
    description: "1-2 frases."

  - type: section
    title: "5 · Tecnología e IA"

  - type: choice
    field: innovation_vs_regulation
    modality: closed
    required: true
    title: "Entre innovación y regulación tecnológica, tiendo a priorizar:"
    options:
      - "Innovar primero, regular después"
      - "Regular preventivamente"
      - "Regulación flexible y experimental"
      - "Depende del riesgo"

  - type: paragraph
    field: tech_open
    modality: open
    required: true
    title: "¿Cómo crees que el Estado debería tratar a las nuevas tecnologías como la IA? ¿Por qué?"
    description: "1-2 frases."

  - type: section
    title: "6 · Vigilancia y seguridad"

  - type: choice
    field: surveillance_concern
    modality: closed
    required: true
    title: "Pensando en IA, datos y control, ¿qué te preocupa más?"
    options:
      - "Que el Estado o las empresas vigilen demasiado a las personas"
      - "Que falte seguridad y control frente a delitos o amenazas"
      - "Me preocupan ambas por igual"
      - "Ninguna me preocupa mucho"

  - type: paragraph
    field: surveillance_open
    modality: open
    required: false
    title: "¿Por qué? ¿Dónde pondrías el límite?"
    description: "1 frase (opcional)."

  - type: section
    title: "7 · Prioridades públicas"

  - type: checkbox
    field: priorities
    modality: closed
    required: true
    title: "Elige tus tres prioridades públicas principales"
    description: "Marca hasta tres."
    options:
      - "Seguridad ciudadana"
      - "Crecimiento económico"
      - "Desigualdad"
      - "Educación"
      - "Salud"
      - "Medio ambiente"
      - "Vivienda"
      - "Corrupción"
      - "Derechos digitales"
      - "Empleo y automatización"
      - "Democracia y participación"
      - "Migración"
      - "Otra"

  - type: paragraph
    field: priorities_why
    modality: open
    required: true
    title: "¿Por qué esas prioridades son importantes para ti?"
    description: "1-2 frases."

  - type: section
    title: "8 · Confianza institucional"
    description: "1 = nada de confianza, 5 = mucha confianza."

  - type: scale
    field: trust_government
    modality: closed
    required: true
    title: "Confianza en el Gobierno / Ejecutivo"
    low: 1
    high: 5
    low_label: "Nada"
    high_label: "Mucha"

  - type: scale
    field: trust_congress
    modality: closed
    required: true
    title: "Confianza en el Congreso"
    low: 1
    high: 5
    low_label: "Nada"
    high_label: "Mucha"

  - type: scale
    field: trust_tech_companies
    modality: closed
    required: true
    title: "Confianza en las empresas tecnológicas"
    low: 1
    high: 5
    low_label: "Nada"
    high_label: "Mucha"

  - type: scale
    field: trust_media
    modality: closed
    required: true
    title: "Confianza en los medios de comunicación"
    low: 1
    high: 5
    low_label: "Nada"
    high_label: "Mucha"

  - type: paragraph
    field: trust_open
    modality: open
    required: false
    title: "¿En qué instituciones confías más y en cuáles menos? ¿Por qué?"
    description: "1-2 frases (opcional)."

  - type: section
    title: "9 · Cómo decides"

  - type: choice
    field: decision_incomplete_info
    modality: closed
    required: true
    title: "Cuando no tengo información completa, prefiero:"
    options:
      - "Decidir rápido con criterios generales"
      - "Esperar más evidencia"
      - "Consultar expertos"
      - "Escuchar a los afectados"
      - "Depende del costo de equivocarse"

  # NOTA: se quitó "evidencia técnica vs. opinión ciudadana" porque solapaba
  # directamente con Q08 de la encuesta — el avatar "cerrado" habría hecho
  # trampa. Lo infiere desde decision_open y decision_incomplete_info.

  - type: paragraph
    field: decision_open
    modality: open
    required: true
    title: "Cuando enfrentas una decisión difícil, ¿cómo decides? Describe tu forma de pensar."
    description: "1-2 frases."

  - type: section
    title: "10 · Tu avatar"

  - type: paragraph
    field: avatar_free_text
    modality: open
    required: true
    title: "Escribe 5–8 frases que ayuden a tu avatar a representarte políticamente"
    description: "Valores, intuiciones, límites, contradicciones, temas que te importan. Es la parte que MÁS ayuda a tu avatar. No incluyas información personal identificable."

  - type: choice
    field: avatar_when_unsure
    modality: context
    required: true
    title: "¿Qué debería hacer tu avatar si no está seguro de tu posición?"
    options:
      - "Elegir la opción más consistente con mis valores generales"
      - "Elegir una opción moderada"
      - "Declarar incertidumbre"
      - "Priorizar derechos individuales"
      - "Priorizar bienestar colectivo"

  - type: paragraph
    field: avatar_avoid
    modality: context
    required: false
    title: "¿Hay alguna posición que NO quieres que tu avatar asuma en tu nombre?"
    description: "Opcional."
